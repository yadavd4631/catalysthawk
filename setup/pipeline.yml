name: pipeline

on:
  schedule:
    # UTC crons. Coverage: US pre-market -> after-hours Form 4 deadline (10pm ET).
    - cron: "*/30 12-23 * * 1-5"
    - cron: "*/30 0-2 * * 2-6"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pipeline
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Run pipeline (collect -> detect -> publish)
        env:
          SEC_CONTACT_EMAIL: ${{ secrets.SEC_CONTACT_EMAIL }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_PUBLIC_CHANNEL: ${{ vars.TELEGRAM_PUBLIC_CHANNEL }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DRY_RUN: ${{ vars.DRY_RUN }}
        run: python -m src.run_pipeline

      - name: Commit data, state & charts
        run: |
          git config user.name "catalysthawk-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data state out
          git diff --staged --quiet || git commit -m "pipeline: $(date -u +'%Y-%m-%d %H:%M') UTC"
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
          git push
